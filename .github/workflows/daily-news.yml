name: Daily News

on:
  schedule:
    # Runs at 22:00 UTC every day. Adjust to match your desired "end of day"
    # in the relevant timezone (GitHub Actions cron is always UTC).
    # e.g. 22:00 UTC = 19:00 America/Sao_Paulo (BRT, UTC-3) most of the year.
    - cron: "0 22 * * *"
  workflow_dispatch: {}   # allows manual "Run workflow" trigger for testing

jobs:
  send-daily-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily news agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: python daily_news.py
